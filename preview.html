  <style>
    /* Global Styles and Design System Variables */
    :root {
      --primary-color: #1b4d3e;
      --primary-light: #2d6a4f;
      --primary-dark: #133c30;
      --primary-glow: rgba(27, 77, 62, 0.15);
      
      --accent-color: #e07a5f;
      --accent-light: #f4f1de;
      --accent-hover: #d0664b;
      
      --bg-main: #f8f9fa;
      --bg-card: #ffffff;
      --bg-neutral-light: #f1f3f5;
      
      --text-main: #212529;
      --text-muted: #6c757d;
      --text-light: #adb5bd;
      --text-white: #ffffff;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-full: 9999px;
      
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.12);
      
      --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .fade-in {
      animation: fadeIn var(--transition-normal) forwards;
    }

    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justifyContent: center;
      z-index: 9999;
      padding: 20px;
    }

    /* Input Focus Styles */
    .custom-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1.5px solid #dee2e6;
      font-size: 14px;
      font-weight: 500;
      color: #212529;
      background-color: #f8f9fa;
      outline: none;
      transition: all 0.2s ease-in-out;
    }
    .custom-input:focus {
      border: 1.5px solid var(--primary-color) !important;
      background-color: #ffffff !important;
      box-shadow: 0 0 0 4px var(--primary-glow) !important;
    }

    .custom-input-with-icon {
      padding-left: 48px;
    }

    /* Table responsivity */
    .table-container {
      width: 100%;
      overflow-x: auto;
    }

    /* Zoom utilities */
    .product-image-zoom {
      transition: transform 0.5s ease;
    }
    .product-image-zoom:hover {
      transform: scale(1.08);
    }

    /* Spinner */
    .loading-spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React Logic (JSX) via Babel -->
  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- 1. JURY NAVIGATION CONSOLE ---
    function NavigationConsole({ currentScreen, setScreen }) {
      const [isOpen, setIsOpen] = useState(true);

      const clientScreens = [
        { id: 'recovery', name: '1. Récupération Mot de passe', desc: 'Split-screen épuré, validation d\'email et écran de succès' },
        { id: 'home', name: '2. Page d’accueil AgroMarket', desc: 'Catalogue produit, recherche dynamique, filtres et panier réactif' },
        { id: 'orders', name: '3. Commandes (Client)', desc: 'Historique des commandes client, badges d’état, suivi timeline et export CSV' },
        { id: 'checkout-wizard', name: '9. Tunnel de Paiement Wizard', desc: 'Étape par étape : adresse, livraison, paiement interactif, validation et résumé dynamique' },
        { id: 'login-page', name: '13. Page de Connexion', desc: 'Split-screen premium, validation, affichage mot de passe, se souvenir de moi et réseaux sociaux' },
        { id: 'cart', name: '18. Mon Panier', desc: 'Gestion des articles du panier, résumé, code promo et checkout (Design ultra-moderne)' },
        { id: 'faq', name: '19. FAQ & Support', desc: 'Foire aux questions avec accordéon, filtrage par catégories et barre de recherche' },
        { id: 'product-detail', name: '20. Détail Produit (Banane)', desc: 'Page produit premium avec galerie, ferme, actions d\'achat et logistique' },
        { id: 'edit-profile', name: '21. Éditer Profil', desc: 'Formulaire moderne avec upload de photo et informations personnelles' }
      ];

      const sellerScreens = [
        { id: 'my-products', name: '4. Mes Produits (Vendeur)', desc: 'Dashboard vendeur avec filtres d\'état, duplication et suppression' },
        { id: 'plans', name: '5. Plans d’abonnement', desc: 'Tarification à 3 plans avec sélection interactive (Basic / Pro / Premium)' },
        { id: 'add-product', name: '6. Ajouter un produit', desc: 'Formulaire multi-onglets avec prévisualisation en direct (Live Preview)' },
        { id: 'order-detail-admin', name: '7. Détail Commande (Admin)', desc: 'Supervision de commande, suivi logistique 4 étapes, validation interactive' },
        { id: 'order-management-admin', name: '8. Gestion Commandes (Admin)', desc: 'Tableau de bord logistique, filtrage par onglet d\'état, recherche et actions de suivi' },
        { id: 'seller-dashboard', name: '10. Tableau de bord Vendeur', desc: 'KPIs, graphique de revenus interactif, top produits, commandes récentes et actions rapides' },
        { id: 'user-profile', name: '11. Profil & Paramètres', desc: 'Edition profil, sécurité (2FA), préférences de notification, boutique et coordonnées bancaires' },
        { id: 'notifications', name: '12. Centre de Notifications', desc: 'Alertes temps réel, filtres par catégorie, marquage lu/non-lu, badges urgents et actions' },
        { id: 'admin-dashboard', name: '14. Tableau de bord Admin', desc: 'Sidebar repliable, KPIs avec barres de progression, graphe interactif et listes récentes' },
        { id: 'sales-history', name: '15. Historique des Ventes', desc: 'Graphe double barres (ventes/commandes), donut SVG par catégorie et tableau filtrable avec totaux' },
        { id: 'stock-alerts', name: '16. Alertes de Stocks', desc: 'Bannière d\'alerte rouge, barres de progression de remplissage, priorités et commandes d\'urgence' },
        { id: 'moderation-panel', name: '17. Modération & Signalements', desc: 'Stats bar, onglets de filtrage par état, cartes de signalement extensibles et actions de modération' }
      ];

      return (
        <div style={consoleStyles.container}>
          {/* Toggle Button */}
          <button 
            onClick={() => setIsOpen(!isOpen)} 
            style={consoleStyles.toggleBtn}
            title={isOpen ? "Masquer la console" : "Afficher la console de navigation"}
          >
            {isOpen ? (
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 15l-6-6-6 6"/></svg>
            ) : (
              <div style={consoleStyles.pulseContainer}>
                <span style={consoleStyles.pulseDot}></span>
                <span style={consoleStyles.toggleText}>Console Jury : Cliquer pour basculer d'écran (21 interfaces disponibles)</span>

              </div>
            )}

          {/* Expanded Console */}
          {isOpen && (
            <div style={consoleStyles.consoleBody} className="fade-in">
              <div style={consoleStyles.header}>
                <div style={consoleStyles.headerTitle}>
                  <span style={consoleStyles.badge}>CONCEPTION PROFESSIONNELLE</span>
                  <h4 style={consoleStyles.title}>Visualisation Interactive des 21 Interfaces</h4>
                </div>
                <p style={consoleStyles.subtitle}>

                            ...(isActive ? consoleStyles.activeScreenBtn : {})

                            ...consoleStyles.btnText,
                            ...(isActive ? consoleStyles.activeBtnText : {})
                          }}>

                          </span>
                          <span style={{

                          }}>

                  <div style={consoleStyles.btnGrid}>
                    {sellerScreens.map((screen) => {
                      const isActive = currentScreen === screen.id;
                      return (

                          <span style={{

                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const consoleStyles = {
      container: {

      },

      },

      },
      header: {
        marginBottom: '14px',
      },
      headerTitle: {
        display: 'flex',
        alignItems: 'center',
        gap: '12px',
        marginBottom: '4px',
      },
      badge: {
        backgroundColor: '#e07a5f',

        padding: '3px 8px',
        borderRadius: '4px',
        letterSpacing: '0.05em',
      },
      title: {
        color: '#ffffff',

        fontWeight: '700',
        margin: 0,
      },
      subtitle: {
        color: '#a3c2b8',
        fontSize: '12px',
        margin: 0,
      },
      sectionsContainer: {
        display: 'grid',
        gridTemplateColumns: '1fr 1fr',
        gap: '20px',
      },
      sectionCol: {
        display: 'flex',
        flexDirection: 'column',
        gap: '6px',
      },
      sectionTitle: {
        fontSize: '11px',
        fontWeight: '800',
        color: '#f4f1de',
        textTransform: 'uppercase',
        letterSpacing: '0.05em',
        borderBottom: '1px solid rgba(255,255,255,0.08)',

      },
      btnGrid: {
        display: 'flex',
        flexDirection: 'column',

      },
      screenBtn: {
        display: 'flex',
        flexDirection: 'column',

      },
      activeBtnDesc: {
        color: '#6c757d',
      }
    };


    // --- 2. PASSWORD RECOVERY COMPONENT ---
    function PasswordRecovery({ onBack }) {
      const [email, setEmail] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!email) {
          setError('Veuillez entrer une adresse e-mail valide.');
          return;
        }
        if (!/\S+@\S+\.\S+/.test(email)) {
          setError('Format d’adresse e-mail invalide.');
          return;
        }
        setError('');
        setIsLoading(true);
        setTimeout(() => {
          setIsLoading(false);
          setIsSubmitted(true);
        }, 1200);
      };

      return (
        <div style={recoveryStyles.pageContainer} className="fade-in">
          <div style={recoveryStyles.cardContainer}>
            <div style={recoveryStyles.leftPanel}>
              <div style={recoveryStyles.brandContainer}>
                <div style={recoveryStyles.logoCircle}>🌱</div>
                <span style={recoveryStyles.brandName}>AgroMarket</span>
              </div>
              <div style={recoveryStyles.leftContent}>
                <h1 style={recoveryStyles.leftTitle}>Récupération</h1>
                <h2 style={recoveryStyles.leftSubtitle}>Mot de passe</h2>
                <div style={recoveryStyles.divider}></div>
                <p style={recoveryStyles.leftText}>
                  Nous vous enverrons un lien de récupération sécurisé pour réinitialiser votre accès.
                </p>
              </div>
              <div style={recoveryStyles.leftFooter}>
                © 2026 AgroMarket — Sécurité
              </div>
            </div>

            <div style={recoveryStyles.rightPanel}>
              {!isSubmitted ? (
                <form onSubmit={handleSubmit} style={recoveryStyles.form} noValidate>
                  <div style={recoveryStyles.formHeader}>
                    <h3 style={recoveryStyles.formTitle}>Réinitialiser votre mot de passe</h3>
                    <p style={recoveryStyles.formDescription}>
                      Entrez l'adresse email associée à votre compte.
                    </p>
                  </div>

                  <div style={recoveryStyles.inputGroup}>
                    <label htmlFor="recovery-email" style={recoveryStyles.label}>
                      Email ou Nom d'utilisateur
                    </label>
                    <div style={recoveryStyles.inputWrapper}>
                      <svg style={recoveryStyles.inputIcon} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                        <rect x="3" y="4" width="18" height="14" rx="2" ry="2"/>
                        <polyline points="22,6 12,13 2,6"/>
                      </svg>
                      <input
                        id="recovery-email"
                        type="email"
                        placeholder="votre@email.com"
                        value={email}
                        onChange={(e) => {
                          setEmail(e.target.value);
                          if (error) setError('');
                        }}
                        className="custom-input custom-input-with-icon"
                        style={error ? { borderColor: '#dc3545', backgroundColor: '#fff8f8' } : {}}
                        disabled={isLoading}
                      />
                    </div>
                    {error && <span style={recoveryStyles.errorText} className="fade-in">{error}</span>}
                  </div>

                  <div style={recoveryStyles.alertBox}>
                    <div style={recoveryStyles.alertIcon}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2b6cb0" strokeWidth="2.5">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                      </svg>
                    </div>
                    <div style={recoveryStyles.alertContent}>
                      <p style={recoveryStyles.alertText}>
                        Vous recevrez un email avec un lien pour réinitialiser votre mot de passe.
                      </p>
                      <p style={recoveryStyles.alertSubtext}>
                        Le lien sera valide pendant 24 heures.
                      </p>
                    </div>
                  </div>

                  <button 
                    type="submit" 
                    style={{
                      ...recoveryStyles.submitBtn,
                      ...(isLoading ? recoveryStyles.submitBtnLoading : {})
                    }}
                    disabled={isLoading}
                  >
                    {isLoading ? (
                      <span className="loading-spinner"></span>
                    ) : (
                      <>
                        <span>Envoyer le lien</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                          <line x1="5" y1="12" x2="19" y2="12"/>
                          <polyline points="12 5 19 12 12 19"/>
                        </svg>
                      </>
                    )}
                  </button>

                  <button type="button" onClick={onBack} style={recoveryStyles.backLink}>
                    <span>Retour connexion</span>
                  </button>
                </form>
              ) : (
                <div style={recoveryStyles.successContainer} className="fade-in">
                  <div style={recoveryStyles.successIconWrapper}>
                    <div style={recoveryStyles.successIconPulse}></div>
                    <div style={recoveryStyles.successIcon}>
                      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" strokeWidth="2.5">
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                    </div>
                  </div>
                  
                  <h3 style={recoveryStyles.successTitle}>E-mail Envoyé !</h3>
                  <p style={recoveryStyles.successDescription}>
                    Un lien a été envoyé à : <strong style={recoveryStyles.successEmail}>{email}</strong>
                  </p>
                  
                  <button type="button" onClick={() => setIsSubmitted(false)} style={recoveryStyles.retryBtn}>
                    Ressayer avec un autre e-mail
                  </button>

                  <button type="button" onClick={onBack} style={recoveryStyles.backToLoginBtn}>
                    Retourner à la connexion
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

        display: 'flex',

        justifyContent: 'space-between',
        color: '#ffffff',
        flex: '1 1 320px',
      },
      brandContainer: { display: 'flex', alignItems: 'center', gap: '10px' },
      logoCircle: {
        width: '32px',
        height: '32px',
        backgroundColor: 'rgba(255, 255, 255, 0.15)',
        borderRadius: '50%',
        display: 'flex',

      },

      rightPanel: {

        flex: '1.2 1 360px',
      },
      form: { width: '100%', maxWidth: '340px' },
      formHeader: { marginBottom: '20px' },
      formTitle: { fontSize: '20px', fontWeight: '800', color: '#212529', marginBottom: '6px' },
      formDescription: { fontSize: '12px', color: '#6c757d' },
      inputGroup: { marginBottom: '16px', display: 'flex', flexDirection: 'column', gap: '6px' },
      label: { fontSize: '11px', fontWeight: '700', color: '#343a40' },
      inputWrapper: { position: 'relative', display: 'flex', alignItems: 'center' },
      inputIcon: { position: 'absolute', left: '16px', color: '#adb5bd' },
      errorText: { fontSize: '11px', color: '#dc3545', fontWeight: '600' },
      alertBox: {
        display: 'flex',
        gap: '10px',
        padding: '12px',
        borderRadius: '10px',
        backgroundColor: '#ebf8ff',
        border: '1px solid #bee3f8',

      const [activeTab, setActiveTab] = useState('Toutes');

      const filteredOrders = useMemo(() => {

        if (activeTab === 'Livrées') return INITIAL_ORDERS.filter(o => o.status === 'Livrée');
        return INITIAL_ORDERS.filter(o => o.status === activeTab);
      }, [activeTab]);

      const handleExportCSV = () => {
        setExporting(true);
        const headers = 'Commande #,Date,Montant (FCFA),Articles,Statut,Adresse\n';
        const rows = filteredOrders.map(o => `"${o.id}","${o.date}","${o.amount}","${o.itemCount}","${o.status}","${o.address}"`).join('\n');
        const csvContent = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(headers + rows);
        const link = document.createElement('a');
        link.setAttribute('href', csvContent);
        link.setAttribute('download', `commandes_${activeTab.toLowerCase()}.csv`);
        document.body.appendChild(link);
        setTimeout(() => {
          link.click();
          document.body.removeChild(link);
          setExporting(false);

        { id: 3, name: 'Maïs Premium', category: 'Céréales', stock: 15, unit: 'kg', sales: 45, price: 3000, status: 'Inactif', imageUrl: 'https://images.unsplash.com/photo-1551754625-7fc5b945222b?w=150&auto=format&fit=crop&q=60' },
        { id: 4, name: 'Miel de Casamance', category: 'Miel', stock: 8, unit: 'L', sales: 32, price: 4500, status: 'Actif', imageUrl: 'https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=150&auto=format&fit=crop&q=60' }
      ]);
      const [filterTab, setFilterTab] = useState('Tous');
      const [notification, setNotification] = useState('');

      const handleDelete = (id, name) => {
        if (window.confirm(`Êtes-vous sûr de vouloir supprimer "${name}" ?`)) {
          setProducts(prev => prev.filter(p => p.id !== id));
          setNotification(`"${name}" supprimé !`);
          setTimeout(() => setNotification(''), 2200);
        }
      };

      const handleDuplicate = (p) => {
        const dup = { ...p, id: Date.now(), name: `${p.name} (Copie)`, sales: 0 };
        setProducts(prev => [...prev, dup]);
        setNotification(`"${p.name}" dupliqué !`);
        setTimeout(() => setNotification(''), 2200);
      };

      const counts = useMemo(() => ({
        tous: products.length,
        actifs: products.filter(p => p.status === 'Actif').length,
        inactifs: products.filter(p => p.status === 'Inactif').length
      }), [products]);

      const filtered = useMemo(() => {
        if (filterTab === 'Actifs') return products.filter(p => p.status === 'Actif');
        if (filterTab === 'Inactifs') return products.filter(p => p.status === 'Inactif');
        return products;
      }, [products, filterTab]);

      return (
        <div style={myProdStyles.container} className="fade-in">
          {notification && (
            <div style={myProdStyles.toast} className="fade-in"><span>🔔 {notification}</span></div>
          )}

            <span style={myProdStyles.filterLabel}>Filtrer :</span>
            <div style={myProdStyles.tabsContainer}>
              {['Tous', 'Actifs', 'Inactifs'].map(tab => {
                const count = tab === 'Tous' ? counts.tous : (tab === 'Actifs' ? counts.actifs : counts.inactifs);
                return (
                  <button 
                    key={tab}
                    onClick={() => setFilterTab(tab)}
                    style={{...myProdStyles.tabBtn, ...(filterTab === tab ? myProdStyles.tabBtnActive : {})}}
                  >
                    {tab} ({count})
                  </button>
                );
              })}
            </div>
          </div>

          <div style={myProdStyles.tableCard}>
            {filtered.length > 0 ? (
              <div className="table-container">
                <table style={myProdStyles.table}>
                  <thead>
                    <tr>
                      <th style={myProdStyles.th}>Image</th>
                      <th style={myProdStyles.th}>Produit</th>
                      <th style={myProdStyles.th}>Catégorie</th>
                      <th style={myProdStyles.th}>Stock</th>
                      <th style={myProdStyles.th}>Ventes</th>
                      <th style={myProdStyles.th}>Prix</th>
                      <th style={myProdStyles.th}>Status</th>
                      <th style={myProdStyles.th}>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map(p => (
                      <tr key={p.id} style={myProdStyles.tr}>
                        <td style={myProdStyles.tdImage}>
                          <div style={myProdStyles.imageBox}>
                            <img src={p.imageUrl} alt="" style={myProdStyles.image} onError={(e) => e.target.src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="%23e2e8f0"/></svg>'} />
                          </div>
                        </td>
                        <td style={myProdStyles.tdName}>{p.name}</td>
                        <td style={myProdStyles.tdCategory}>{p.category}</td>
                        <td style={myProdStyles.tdStock}>
                          <span style={{...myProdStyles.stockText, ...(p.stock === 0 ? myProdStyles.outText : {})}}>
                            {p.stock} {p.unit}
                          </span>
                        </td>
                        <td style={myProdStyles.td}>{p.sales}</td>
                        <td style={myProdStyles.tdPrice}>{p.price.toLocaleString()} FCFA</td>
                        <td style={myProdStyles.td}>
                          <span style={{
                            ...myProdStyles.statusDot,
                            backgroundColor: p.status === 'Actif' ? '#2d6a4f' : '#adb5bd'
                          }}></span>
                        </td>
                        <td style={myProdStyles.tdActions}>
                          <button onClick={() => onEditProduct(p)} style={myProdStyles.actionBtn}>Éditer</button>
                          <span style={myProdStyles.divider}>|</span>
                          <button onClick={() => handleDuplicate(p)} style={myProdStyles.actionBtn}>Dupliquer</button>
                          <span style={myProdStyles.divider}>|</span>
                          <button onClick={() => handleDelete(p.id, p.name)} style={{...myProdStyles.actionBtn, color: '#dc3545'}}>Supprimer</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ) : (
              <div style={myProdStyles.empty}><h4>Aucun produit</h4></div>
            )}
          </div>
        </div>
      );
    }

                           (activeTab === 'En livraison' && order.status === 'En livraison') ||

      const baseSubtotal = 92500;
      const promoDiscount = -10000;
      
      const getShippingCost = () => shippingMethod === 'express' ? 5000 : 2000;
      const getShippingLabel = () => shippingMethod === 'express' ? 'Express (DHL)' : 'Standard (Point Relais)';
      const getTotal = () => baseSubtotal + promoDiscount + getShippingCost();

      const validateStep1 = () => {
        const tempErrors = {};
        if (!formData.fullName.trim()) tempErrors.fullName = 'Le nom complet est requis.';
        if (!formData.phone.trim()) tempErrors.phone = 'Le numéro de téléphone est requis.';
        if (!formData.address.trim()) tempErrors.address = 'L’adresse de livraison est requise.';
        if (!formData.city.trim()) tempErrors.city = 'La ville est requise.';
        setErrors(tempErrors);
        return Object.keys(tempErrors).length === 0;
      };

      const handleNext = () => {
        if (step === 1) {
          if (validateStep1()) {
            setStep(2);
          } else {
            setNotification('⚠️ Veuillez remplir correctement tous les champs obligatoires.');
            setTimeout(() => setNotification(''), 3000);
          }
        } else if (step === 2) {
          setStep(3);
        } else if (step === 3) {
          setStep(4);
          if (onOrderSuccess) {
            onOrderSuccess({
              id: '2026-004',
              client: formData.fullName,
              amount: getTotal(),
              status: 'En attente',
              date: 'Aujourd\'hui'
            });
          }
        }
      };

      const handleBack = () => {
        if (step > 1 && step < 4) setStep(step - 1);
      };

      const handleInputChange = (field, val) => {
        setFormData(prev => ({ ...prev, [field]: val }));
        if (errors[field]) setErrors(prev => ({ ...prev, [field]: null }));
      };

      return (
        <div style={wizardStyles.container} className="fade-in">
          {notification && (
            <div style={wizardStyles.toast} className="fade-in">
              <span>{notification}</span>

            <div style={wizardStyles.header}>

              <button onClick={onCancel} style={{ fontSize: '12px', fontWeight: '700', color: '#6c757d', borderBottom: '1px dashed #adb5bd', cursor: 'pointer' }}>

            </div>

          <div style={wizardStyles.wizardCard}>

                const stepNum = idx + 1;
                const isCompleted = step > stepNum;
                const isActive = step === stepNum;
                return (
                  <div key={name} style={wizardStyles.wizardStepContainer}>
                    <div style={{
                      ...wizardStyles.wizardDot,
                      backgroundColor: isCompleted ? '#2d6a4f' : (isActive ? '#1b4d3e' : '#ffffff'),
                      borderColor: isCompleted || isActive ? '#1b4d3e' : '#adb5bd',
                    }}>
                      {isCompleted ? (
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ffffff" strokeWidth="3">
                          <polyline points="20 6 9 17 4 12" />
                        </svg>
                      ) : (
                        <span style={{ ...wizardStyles.wizardNumber, color: isActive ? '#ffffff' : '#adb5bd' }}>{stepNum}</span>
                      )}
                    </div>
                    <span style={{ ...wizardStyles.wizardLabel, color: isActive || isCompleted ? '#212529' : '#868e96', fontWeight: isActive || isCompleted ? '700' : '500' }}>{name}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {step === 4 ? (
            <div style={wizardStyles.successCard} className="fade-in">
              <div style={wizardStyles.successIconWrapper}>
                <div style={wizardStyles.successIconPulse}></div>

                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" strokeWidth="3">
                    <polyline points="20 6 9 17 4 12" />
                  </svg>

                <div style={wizardStyles.orderInfoLine}><span style={wizardStyles.infoLabel}>Livraison</span><span style={wizardStyles.infoValue}>{getShippingLabel()}</span></div>
              </div>

              <button onClick={onCancel} style={wizardStyles.successBtn}>Retourner à l'accueil</button>
            </div>

                        {errors.fullName && <span style={wizardStyles.errorText}>{errors.fullName}</span>}

                      <div style={wizardStyles.inputGroup}>

                            <h4 style={wizardStyles.selectionTitleText}>Livraison Standard (Point Relais)</h4>

                        <span style={wizardStyles.selectionPrice}>2,000 FCFA</span>
                      </div>

                {step === 3 && (
                  <div className="fade-in">
                    <h3 style={wizardStyles.sectionTitle}>Moyen de paiement</h3>

      actionIcon: { fontSize: '22px' },
      actionLabel: { textAlign: 'center', lineHeight: '1.2', fontSize: '12px' },
      summaryStrip: { display: 'flex', backgroundColor: '#f8f9fa', borderRadius: '10px', padding: '12px 16px', border: '1px solid #e9ecef' },
      stripItem: { flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2px' },
      stripLabel: { fontSize: '10px', color: '#868e96', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.04em' },
      stripValue: { fontSize: '15px', fontWeight: '800', color: '#212529' },
      stripDivider: { width: '1px', backgroundColor: '#dee2e6', alignSelf: 'stretch', margin: '0 10px' }
    };

    // --- 11. PREMIUM PLACEHOLDER (For Modules under finalization) ---
    function PremiumPlaceholder({ title, icon, onBack }) {
      return (
        <div style={placeholderStyles.container} className="fade-in">
          <div style={placeholderStyles.card}>
            <div style={placeholderStyles.iconWrap}>
              <div style={placeholderStyles.iconPulse}></div>
              <span style={placeholderStyles.icon}>{icon}</span>
            </div>
            <h2 style={placeholderStyles.title}>{title}</h2>
            <p style={placeholderStyles.subtitle}>
              Ce module a été intégré dans l'application principale (React src) et sera bientôt visible dans cet aperçu autonome avec son design ultra-moderne.
            </p>
            {onBack && (
              <button 
                style={placeholderStyles.backBtn} 
                onClick={onBack}
                onMouseEnter={(e) => { e.target.style.transform = 'translateY(-2px)'; e.target.style.boxShadow = '0 6px 16px rgba(27, 77, 62, 0.3)'; }}
                onMouseLeave={(e) => { e.target.style.transform = 'translateY(0)'; e.target.style.boxShadow = '0 4px 12px rgba(27, 77, 62, 0.2)'; }}
              >
                Retour
              </button>
            )}
          </div>
        </div>
      );
    }

    const placeholderStyles = {
      container: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '40px 20px', backgroundColor: '#f8f9fa' },
      card: { backgroundColor: '#ffffff', borderRadius: '24px', padding: '48px 32px', textAlign: 'center', maxWidth: '440px', width: '100%', boxShadow: '0 12px 36px rgba(0,0,0,0.06)', border: '1px solid #e9ecef', display: 'flex', flexDirection: 'column', alignItems: 'center' },
      iconWrap: { position: 'relative', width: '88px', height: '88px', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '24px' },
      iconPulse: { position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(45, 106, 79, 0.08)', borderRadius: '50%', animation: 'pulse 2s infinite' },
      icon: { fontSize: '40px', zIndex: 1 },
      title: { fontSize: '24px', fontWeight: '800', color: '#212529', marginBottom: '12px', letterSpacing: '-0.02em' },
      subtitle: { fontSize: '14.5px', color: '#6c757d', lineHeight: '1.6', marginBottom: '32px' },
      backBtn: { padding: '14px 32px', backgroundColor: '#1b4d3e', color: '#ffffff', borderRadius: '12px', fontSize: '14px', fontWeight: '700', border: 'none', cursor: 'pointer', transition: 'all 0.3s ease', boxShadow: '0 4px 12px rgba(27, 77, 62, 0.2)' }
    };


    // --- 8. MAIN APP CONTAINER ---
    function App() {
      const [screen, setScreen] = useState('home');
      const [adminOrders, setAdminOrders] = useState([
        { id: '001', client: 'Client A', amount: 25000, status: 'En préparation', date: '15/05' },
        { id: '002', client: 'Client B', amount: 45500, status: 'En livraison', date: '13/05' },
        { id: '003', client: 'Client C', amount: 18500, status: 'En attente', date: '12/05' }
      ]);

      const renderScreen = () => {
        switch (screen) {
          case 'recovery':
            return <PasswordRecovery onBack={() => setScreen('home')} />;
          case 'home':
            return (
              <AgroMarketHome 
                onNavigateToOrders={() => setScreen('orders')} 
                onNavigateToRecovery={() => setScreen('recovery')} 
                onNavigateToCheckout={() => setScreen('checkout-wizard')}
              />
            );
          case 'orders':
            return <OrderManagement onBackHome={() => setScreen('home')} />;
          case 'my-products':
            return (
              <MyProducts 
                onNavigateToAddProduct={() => setScreen('add-product')} 
                onEditProduct={() => setScreen('add-product')}
              />
            );
          case 'plans':
            return <SubscriptionPlans />;
          case 'add-product':
            return (
              <AddProduct 
                onProductAdded={(p) => {
                  alert(`Produit "${p.name}" publié avec succès !`);
                  setScreen('my-products');
                }}
                onCancel={() => setScreen('my-products')}
              />
            );
          case 'order-detail-admin':
            return (
              <OrderDetailAdmin 
                onBack={() => setScreen('order-management-admin')}
                onMarkAsDeliveredState={(id, newStatus) => {
                  setAdminOrders(prev => prev.map(o => o.id === id ? { ...o, status: newStatus } : o));
                }}
              />
            );
          case 'order-management-admin':
            return (
              <OrderManagementAdmin 
                ordersData={adminOrders}
                onViewOrder={(id) => setScreen('order-detail-admin')} 
              />
            );
          case 'checkout-wizard':
            return (
              <CheckoutWizard 
                onCancel={() => setScreen('home')}
                onOrderSuccess={(newOrder) => {
                  setAdminOrders(prev => [
                    ...prev,
                    { id: newOrder.id, client: newOrder.client, amount: newOrder.amount, status: newOrder.status, date: newOrder.date }
                  ]);
                }}
              />
            );
          case 'seller-dashboard':
            return <SellerDashboard onNavigate={(s) => setScreen(s)} />;
          case 'user-profile':
            return <PremiumPlaceholder title="Profil & Paramètres" icon="👤" onBack={() => setScreen('home')} />;
          case 'notifications':
            return <PremiumPlaceholder title="Centre de Notifications" icon="🔔" onBack={() => setScreen('home')} />;
          case 'login-page':
            return <PremiumPlaceholder title="Page de Connexion" icon="🔐" onBack={() => setScreen('home')} />;
          case 'admin-dashboard':
            return <PremiumPlaceholder title="Tableau de bord Admin" icon="👑" onBack={() => setScreen('home')} />;
          case 'sales-history':
            return <PremiumPlaceholder title="Historique des Ventes" icon="📈" onBack={() => setScreen('seller-dashboard')} />;
          case 'stock-alerts':
            return <PremiumPlaceholder title="Alertes de Stocks" icon="⚠️" onBack={() => setScreen('seller-dashboard')} />;
          case 'moderation-panel':
            return <PremiumPlaceholder title="Modération & Signalements" icon="🛡️" onBack={() => setScreen('seller-dashboard')} />;
          case 'cart':
            return <PremiumPlaceholder title="Mon Panier" icon="🛒" onBack={() => setScreen('home')} />;
          case 'faq':
            return <PremiumPlaceholder title="Foire aux questions" icon="❓" onBack={() => setScreen('home')} />;
          case 'product-detail':
            return <PremiumPlaceholder title="Détail Produit" icon="🍌" onBack={() => setScreen('home')} />;
          case 'edit-profile':
            return <PremiumPlaceholder title="Éditer Profil" icon="📝" onBack={() => setScreen('user-profile')} />;
          default:
            return <AgroMarketHome onNavigateToOrders={() => setScreen('orders')} onNavigateToRecovery={() => setScreen('recovery')} onNavigateToCheckout={() => setScreen('checkout-wizard')} />;
        }
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh', width: '100%' }}>
          <NavigationConsole currentScreen={screen} setScreen={setScreen} />
          <div style={{ flexGrow: 1, display: 'flex', flexDirection: 'column', width: '100%' }}>
            {renderScreen()}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
